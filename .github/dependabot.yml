version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    cooldown:
      default-days: 7    
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
    groups:
      aws-sdk:
        patterns:
          - "aws-*"
  - package-ecosystem: "github-actions"
    directory: "/"
    cooldown:
      default-days: 7    
    schedule:
      interval: "monthly"
